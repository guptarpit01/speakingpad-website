<h1>How To Overcome Stage Fear</h1>

<p>
Most people think confidence comes before speaking.
Confidence actually comes after repeated speaking practice.
</p>

<p>
Stage fear is normal. The solution is preparation, practice and exposure.
</p>

<p>
Every great speaker was once nervous. The difference is that they kept practicing.
</p>
