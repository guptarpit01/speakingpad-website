<h1>How To Overcome Stage Fear</h1>

<p>Most people think confidence comes before speaking.</p>

<p>In reality, confidence comes after repeated speaking practice.</p>

<p>Stage fear is normal. The solution is preparation, repetition and exposure.</p>
