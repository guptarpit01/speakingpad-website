name: Generate Blog

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Blog HTML
        run: |
          cat > confidence-in-meetings.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>How to Build Confidence in Meetings</title>

              <style>
                  body {
                      font-family: Arial, sans-serif;
                      max-width: 900px;
                      margin: 0 auto;
                      padding: 40px;
                      line-height: 1.8;
                      color: #333;
                  }

                  h1 {
                      color: #1f2937;
                  }

                  h2 {
                      color: #374151;
                      margin-top: 30px;
                  }

                  p {
                      margin-bottom: 16px;
                  }

                  .hero {
                      background: #f3f4f6;
                      padding: 30px;
                      border-radius: 12px;
                      margin-bottom: 30px;
                  }

                  .footer {
                      margin-top: 50px;
                      border-top: 1px solid #ddd;
                      padding-top: 20px;
                      color: #666;
                  }
              </style>
          </head>

          <body>

              <div class="hero">
                  <h1>How to Build Confidence in Meetings</h1>
                  <p>
                      Confidence is not something people are born with.
                      It is a skill developed through preparation,
                      communication, and consistent practice.
                  </p>
              </div>

              <h2>1. Prepare Before the Meeting</h2>

              <p>
                  The easiest way to feel confident is to know your material.
                  Review the agenda, understand the key discussion points,
                  and prepare your perspective beforehand.
              </p>

              <h2>2. Speak Early</h2>

              <p>
                  Many professionals wait until the end of the meeting.
                  Speaking within the first few minutes reduces anxiety
                  and helps establish your presence.
              </p>

              <h2>3. Focus on Adding Value</h2>

              <p>
                  Do not aim to sound intelligent.
                  Aim to contribute useful information,
                  ask thoughtful questions,
                  or provide relevant insights.
              </p>

              <h2>4. Practice Structured Communication</h2>

              <p>
                  Use simple frameworks:
              </p>

              <ul>
                  <li>Situation</li>
                  <li>Observation</li>
                  <li>Recommendation</li>
              </ul>

              <p>
                  Structured communication improves clarity and credibility.
              </p>

              <h2>5. Build Confidence Through Repetition</h2>

              <p>
                  Confidence is a by-product of experience.
                  Every meeting is an opportunity to practice.
              </p>

              <div class="footer">
                  <p>Generated automatically via GitHub Actions.</p>
              </div>

          </body>
          </html>
          EOF

      - name: Commit Blog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add confidence-in-meetings.html

          git commit -m "Generate blog article" || echo "No changes"

          git push
