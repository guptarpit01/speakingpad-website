name: Generate Blog

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create Blog Article
        run: |
          cat > confidence-in-meetings.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Confidence in Meetings</title>
          </head>
          <body>
            <h1>Confidence in Meetings</h1>

            <p>Many professionals have good ideas but hesitate to speak in meetings.</p>

            <p>Confidence is not about speaking more. It is about contributing with clarity.</p>

            <p>A simple framework is: Prepare one insight, one question, and one recommendation before every meeting.</p>

          </body>
          </html>
          EOF

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add confidence-in-meetings.html
          git commit -m "Generated blog article" || exit 0
          git push
